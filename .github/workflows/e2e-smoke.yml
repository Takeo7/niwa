name: E2E Happy Path Smoke

# PR-D1 (Hito D): runs tests/test_e2e_happy_path_completo.py — the
# single-process smoke that wires task → decompose → autonomous
# exec → auto-deploy → healthcheck → improve:stability with all
# adapters faked. No Docker, no network.
#
# Kept separate from mcp-smoke.yml so a pytest regression can't
# mask (or be masked by) the Docker compose smoke, and so either
# can be disabled independently during an incident.

on:
  push:
    branches: [v0.2]
  pull_request:
    branches: [v0.2]

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: python3 -m pip install --upgrade pip pytest

      - name: Run E2E happy-path smoke
        run: |
          python3 -m pytest -v \
            --junitxml=/tmp/e2e-smoke.xml \
            tests/test_e2e_happy_path_completo.py

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-junit
          path: /tmp/e2e-smoke.xml
