name: MCP Assistant Mode Smoke

# Automates the PR-09 smoke test in CI.
#
# Scope: the smoke test (bin/niwa-mcp-smoke) exercises the Niwa app HTTP
# endpoints that the MCP server proxies to.  The MCP protocol transport
# itself (gateway <-> stdio <-> MCP server) is covered by unit tests
# with mocks (tests/test_mcp_server_v02.py).  Running the full Docker
# MCP gateway in CI would require generating the catalog/config YAMLs
# from scratch (currently the installer does that).  PR-11 will add
# installer-side verification end-to-end.
#
# LLM: ANTHROPIC_API_KEY is intentionally NOT configured.  The smoke
# detects this and reports the assistant_turn roundtrip as skip
# (per PR-09 Decisión A).

on:
  push:
    branches: [v0.2]
  pull_request:
    branches: [v0.2]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate service-to-service token
        id: gen-token
        run: |
          TOKEN=$(python3 -c "import secrets; print(secrets.token_hex(32))")
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Build Niwa app image
        run: |
          docker build -t niwa-app:ci -f niwa-app/Dockerfile niwa-app/

      - name: Write CI compose file
        run: |
          cat > /tmp/docker-compose.ci.yml <<'EOF'
          # Minimal CI compose — app only.
          # See .github/workflows/mcp-smoke.yml for the rationale.
          services:
            app:
              image: niwa-app:ci
              container_name: niwa-ci-app
              environment:
                NIWA_APP_HOST: 0.0.0.0
                NIWA_APP_PORT: "8080"
                NIWA_APP_AUTH_REQUIRED: "1"
                NIWA_APP_USERNAME: admin
                NIWA_APP_PASSWORD: ci-password
                NIWA_APP_SESSION_SECRET: ci-session-secret-not-a-real-one
                NIWA_DB_PATH: /data/niwa.sqlite3
                NIWA_MCP_SERVER_TOKEN: ${NIWA_MCP_SERVER_TOKEN}
              ports:
                - "8080:8080"
              volumes:
                - niwa-data:/data
              healthcheck:
                test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
                interval: 3s
                timeout: 5s
                retries: 20
                start_period: 5s
          volumes:
            niwa-data:
          EOF

      - name: Start stack
        env:
          NIWA_MCP_SERVER_TOKEN: ${{ steps.gen-token.outputs.token }}
        run: |
          docker compose -f /tmp/docker-compose.ci.yml up -d
          docker compose -f /tmp/docker-compose.ci.yml ps

      - name: Wait for app health
        run: |
          for i in $(seq 1 30); do
            cid=$(docker compose -f /tmp/docker-compose.ci.yml ps -q app)
            state=$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "starting")
            echo "attempt $i: $state"
            if [ "$state" = "healthy" ]; then
              echo "App is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "App never became healthy."
          docker compose -f /tmp/docker-compose.ci.yml logs app
          exit 1

      - name: Seed routing_mode=v02 and test project
        id: seed
        run: |
          # Seed via Python inside the container so we hit the same DB the app uses.
          docker compose -f /tmp/docker-compose.ci.yml exec -T app python3 - <<'PY'
          import sqlite3, uuid
          from datetime import datetime, timezone
          conn = sqlite3.connect('/data/niwa.sqlite3')
          conn.execute("INSERT OR REPLACE INTO settings (key, value) VALUES ('routing_mode', 'v02')")
          pid = str(uuid.uuid4())
          now = datetime.now(timezone.utc).isoformat()
          conn.execute(
              "INSERT INTO projects (id, slug, name, area, created_at, updated_at) "
              "VALUES (?, ?, 'CI Smoke', 'proyecto', ?, ?)",
              (pid, 'ci-smoke', now, now),
          )
          conn.commit()
          with open('/data/project_id.txt', 'w') as f:
              f.write(pid)
          print("seeded project_id:", pid)
          PY
          # Capture the project id for the smoke step
          PID=$(docker compose -f /tmp/docker-compose.ci.yml exec -T app cat /data/project_id.txt | tr -d '\r\n')
          echo "project_id=$PID" >> "$GITHUB_OUTPUT"

      - name: Run MCP assistant mode smoke
        id: smoke
        env:
          NIWA_MCP_SERVER_TOKEN: ${{ steps.gen-token.outputs.token }}
        run: |
          mkdir -p /tmp/smoke
          python3 bin/niwa-mcp-smoke \
            --app-url http://localhost:8080 \
            --token "$NIWA_MCP_SERVER_TOKEN" \
            --project-id "${{ steps.seed.outputs.project_id }}" \
            --json | tee /tmp/smoke/smoke.json
          # Exit code from niwa-mcp-smoke: 0 ok, 1 fail
          ok=$(python3 -c "import json; print(json.load(open('/tmp/smoke/smoke.json'))['ok'])")
          if [ "$ok" != "True" ]; then
            echo "Smoke test reported ok=false"
            exit 1
          fi

      - name: Upload smoke JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-output
          path: /tmp/smoke/smoke.json

      - name: Collect app logs on failure
        if: failure()
        run: |
          docker compose -f /tmp/docker-compose.ci.yml logs app > /tmp/smoke/app.log || true

      - name: Upload app logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: /tmp/smoke/app.log

      - name: Teardown
        if: always()
        run: |
          docker compose -f /tmp/docker-compose.ci.yml down -v
